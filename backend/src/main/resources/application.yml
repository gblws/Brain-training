server:
  port: 8080

spring:
  application:
    name: brain
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/brain_train?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s

ai:
  deepseek:
    base-url: ${AI_DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model: ${AI_DEEPSEEK_MODEL:deepseek-chat}
    api-key: ${AI_DEEPSEEK_API_KEY:}
    timeout-seconds: ${AI_DEEPSEEK_TIMEOUT_SECONDS:40}
    max-tokens: ${AI_DEEPSEEK_MAX_TOKENS:500}
  report:
    cache-ttl-minutes: ${AI_REPORT_CACHE_TTL_MINUTES:60}

sms:
  aliyun:
    access-key-id: ${SMS_ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${SMS_ALIYUN_ACCESS_KEY_SECRET:}
    endpoint: ${SMS_ALIYUN_ENDPOINT:dypnsapi.aliyuncs.com}
    region-id: ${SMS_ALIYUN_REGION_ID:cn-beijing}
    country-code: ${SMS_ALIYUN_COUNTRY_CODE:86}
    sign-name: ${SMS_ALIYUN_SIGN_NAME:}
    template-code: ${SMS_ALIYUN_TEMPLATE_CODE:}
    code-length: ${SMS_ALIYUN_CODE_LENGTH:6}
    valid-minutes: ${SMS_ALIYUN_VALID_MINUTES:5}
    interval-seconds: ${SMS_ALIYUN_INTERVAL_SECONDS:60}
